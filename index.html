<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Awesome OSINT Directory - searchable tools and categorized intelligence resources."
    />
    <title>Awesome OSINT Directory</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module">
      const isLocal =
        window.location.hostname === "localhost" ||
        window.location.hostname === "127.0.0.1";
      const path = window.location.pathname;
      const isDistPath =
        /\/dist\/?$/.test(path) || path.endsWith("/dist/index.html");

      if (isLocal || isDistPath) {
        import("/src/main.jsx");
      } else {
        // Fallback for GitHub Pages "Deploy from branch" mode:
        // serve the built Vite app from ./dist/.
        const target = new URL("./dist/", window.location.href).toString();
        if (!window.location.pathname.endsWith("/dist/")) {
          window.location.replace(target);
        }
      }
    </script>
  </body>
</html>
